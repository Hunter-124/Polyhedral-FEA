      .stl + .case.json + bench/reference/<name>.json (interfaces.md §4–§5) and
      full derivations in docs/validation/hand-calcs.md. smoke_bar: uniaxial
      bar σ_vm=1e6 Pa, tip ux=5e-7 m. plate_hole: Kirsch SCF=3.0.
      cantilever: Timoshenko tip deflection 2.0153e-4 m. Generator
      scripts/gen_part_library.py (geometry only; truths hand-authored).
      Anti-cheat: truths only in bench/reference/ and docs/validation/.

